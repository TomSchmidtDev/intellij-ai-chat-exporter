<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">

  <!-- Document shadow -->
  <path d="M5,6 L27,6 L35,14 L35,38 L5,38 Z" fill="#00000018" transform="translate(1,1)"/>

  <!-- Document body -->
  <path d="M5,5 L27,5 L35,13 L35,37 L5,37 Z" fill="#4B96F3"/>

  <!-- Folded corner (darker) -->
  <path d="M27,5 L27,13 L35,13 Z" fill="#2B6FD9"/>

  <!-- Document text lines -->
  <rect x="9"  y="20" width="19" height="2" rx="1" fill="white" opacity="0.75"/>
  <rect x="9"  y="25" width="19" height="2" rx="1" fill="white" opacity="0.75"/>
  <rect x="9"  y="30" width="13" height="2" rx="1" fill="white" opacity="0.75"/>

  <!-- Brain badge: white border ring -->
  <circle cx="28" cy="12" r="12" fill="white"/>

  <!-- Brain badge: coral background -->
  <circle cx="28" cy="12" r="11" fill="#FF6057"/>

  <!-- Brain silhouette (white, two hemispheres) -->
  <!-- Left hemisphere -->
  <path d="
    M 28 6.5
    C 27 5.5, 25 5.5, 24 6.5
    C 22.5 6.5, 21 8, 21 10
    C 20.5 11, 21 13, 22 14
    C 22 15.5, 23.5 17, 25 16.5
    C 26 17.5, 27.5 17.5, 28 17
    L 28 6.5
    Z
  " fill="white"/>

  <!-- Right hemisphere -->
  <path d="
    M 28 6.5
    C 29 5.5, 31 5.5, 32 6.5
    C 33.5 6.5, 35 8, 35 10
    C 35.5 11, 35 13, 34 14
    C 34 15.5, 32.5 17, 31 16.5
    C 30 17.5, 28.5 17.5, 28 17
    L 28 6.5
    Z
  " fill="white" opacity="0.95"/>

  <!-- Centre divide -->
  <line x1="28" y1="7" x2="28" y2="17" stroke="#FF6057" stroke-width="0.9"/>

  <!-- Brain folds - left -->
  <path d="M 23 9 Q 24.5 11 23 13"   fill="none" stroke="#FF6057" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Brain folds - right -->
  <path d="M 33 9 Q 31.5 11 33 13"   fill="none" stroke="#FF6057" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Brainstem -->
  <rect x="26.5" y="17" width="3" height="2.5" rx="1.2" fill="white"/>

</svg>
